{% extends 'base.html' %}

{% block title %}Reports Hub{% endblock %}

{% block content %}

<div class="mb-4 pb-3 border-bottom">
    <h4 class="fw-semibold mb-1">Reports Hub</h4>
    <p class="text-muted mb-0">Select a report to view detailed analysis and insights.</p>
</div>

<div class="row g-4">
    {% for report in reports %}
    <div class="col-12 col-md-6 col-xl-4">
        <div class="card h-100 shadow-sm">
            <div class="card-body d-flex flex-column">
                <h5 class="card-title fw-semibold">{{ report.name }}</h5>
                <p class="card-text text-muted small flex-grow-1">{{ report.description }}</p>
                <a href="{% url report.url %}" class="btn btn-success btn-sm mt-3 align-self-start">
                    View Report &rarr;
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
