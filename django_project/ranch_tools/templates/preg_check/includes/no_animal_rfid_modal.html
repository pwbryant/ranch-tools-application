{% load static %}
<div id="no-animal-rfid-modal" class="modal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">RFID Not Found</h5>
                <button type="button" class="close">&times;</button>
            </div>
            <div class="modal-body">
                <p>
                    No animal with RFID <strong><span id="not-existing-rfid"></span></strong> found in the database.
                </p>
                <p class="text-muted small">
                    If this animal exists under a different ID, search for it below before creating a new record.
                </p>
                <form id="check-existing-eart-tag-form" action="" method="get">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="check_existing_ear_tag_id" class="form-label fw-semibold small">
                            Check for existing Ear Tag ID
                        </label>
                        <input type="text" id="check_existing_ear_tag_id" name="check_existing_ear_tag_id" required>
                    </div>
                    <button id="check-existing-ear-tag-btn" type="button" class="btn btn-primary btn-sm">
                        Search
                    </button>
                </form>
                <div id="check-existing-ear-tag-result" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>
