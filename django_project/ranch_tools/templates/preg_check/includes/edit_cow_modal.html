{% load static %}
{% if cow %}
<div id="editCowModal" class="modal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Cow</h5>
                <button type="button" class="close">&times;</button>
            </div>
            <div class="modal-body">
                <form method="post" action="{% url 'cow-update' pk=cow.id %}">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="edit_ear_tag_id" class="form-label fw-semibold small">Ear Tag ID</label>
                        <input type="text" id="edit_ear_tag_id" name="ear_tag_id" readonly value="{{ cow.ear_tag_id }}">
                        <div class="form-check mt-2">
                            <input class="form-check-input" type="checkbox" id="allow_ear_tag_update" name="allow_ear_tag_update">
                            <label class="form-check-label small" for="allow_ear_tag_update">Allow Ear Tag Update</label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="edit_eid" class="form-label fw-semibold small">RFID</label>
                        {% if cow.eid is None %}
                            <input type="text" id="edit_eid" name="eid" value="">
                        {% else %}
                            <input type="text" id="edit_eid" name="eid" value="{{ cow.eid }}">
                        {% endif %}
                    </div>

                    <div class="mb-3">
                        <label for="edit_birth_year" class="form-label fw-semibold small">Birth Year</label>
                        <input type="number" id="edit_birth_year" name="birth_year" value="{{ cow.birth_year }}" required>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary btn-sm">Update</button>
                        <button id="edit-cow-modal-cancel-btn" type="button" class="btn btn-outline-secondary btn-sm">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endif %}
